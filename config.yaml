# gomediaimport config file
#
# Place at:
#   macOS:  ~/Library/Application Support/gomediaimport/config.yaml
#   Linux:  ~/.config/gomediaimport/config.yaml
# Configuration file defaults will always be overridden by command-line parameters.

# Source directory for media files
# If set here, you can omit the positional SOURCE_DIR argument on the command line.
source_directory: "/path/to/your/source/directory"

# Destination directory for imported media
# If not specified, defaults to ~/Pictures
destination_directory: "/path/to/your/destination/directory"

# Organize files by date into YYYY/MM subdirectories
organize_by_date: false

# Rename files by date and time (YYYYMMDD_HHMMSS format)
rename_by_date_time: false

# Use xxHash64 checksums to identify duplicates (slower but more accurate)
checksum_duplicates: false

# Enable verbose output
verbose: false

# Suppress all non-error output (forces verbose off)
quiet: false

# Perform a dry run without making changes
dry_run: false

# Skip thumbnail import (e.g. video thumbnails)
skip_thumbnails: false

# Delete original files after successful import
delete_originals: false

# Automatically eject source media after successful import
auto_eject: false

# Check for free disk space before importing
check_disk_space: true

# Default action for unknown sidecar file types: ignore, copy, or delete
sidecar_default: delete

# Per-extension sidecar overrides (uncomment and modify as needed)
# sidecars:
#   xmp: copy
#   srt: copy
#   thm: delete

# Number of concurrent copy workers (0 = default of 4)
workers: 0

# --- Watch mode settings (macOS only) ---
# These settings control the auto-import LaunchAgent (gomediaimport watch --install)

# Only import from volumes with a DCIM/ directory (default: true)
watch_require_dcim: true

# Play a macOS system sound when watch import completes (default: Hero)
# Available: Basso, Blow, Bottle, Frog, Funk, Glass, Hero, Morse, Ping, Pop, Purr, Sosumi, Submarine, Tink
# Set to empty string to disable: watch_sound: ""
watch_sound: Hero

# Volume name allowlist (glob patterns). Empty = all ejectable volumes.
# watch_volumes:
#   - "EOS_DIGITAL"
#   - "NIKON*"
